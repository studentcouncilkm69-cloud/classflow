  <script>
    window.onerror = function(message, source, lineno, colno, error) {
      var loader = document.getElementById('loading-screen');
      if(loader) loader.style.display = 'none';
      var errBox = document.createElement('div');
      errBox.style.cssText = "position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999999; display:flex; align-items:center; justify-content:center; padding:20px; font-family:sans-serif;";
      var stack = error && error.stack ? error.stack : 'ไม่มีรายละเอียดเชิงลึก';
      errBox.innerHTML = `
        <div style="background:white; padding:25px; border-radius:12px; border-left:8px solid #ef4444; max-width:500px; width:100%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);">
          <h2 style="color:#ef4444; margin-top:0; font-size:20px; font-weight:bold;">🚨 ระบบเกิดข้อผิดพลาด!</h2>
          <p style="color:#333; font-size:14px; margin-bottom:10px;"><strong>ปัญหา:</strong> ${message}</p>
          <p style="color:#666; font-size:12px; margin-bottom:10px;"><strong>บรรทัดที่:</strong> ${lineno} : ${colno}</p>
          <button onclick="this.parentElement.parentElement.remove()" style="background:#ef4444; color:white; border:none; padding:10px 20px; border-radius:8px; font-weight:bold; cursor:pointer; width:100%;">ปิดหน้าต่างนี้</button>
        </div>
      `;
      document.body.appendChild(errBox);
      return false; 
    };
    window.addEventListener('unhandledrejection', function(event) {
      window.onerror("Unhandled Promise Rejection: " + (event.reason.message || "Unknown Rejection"), '', 0, 0, event.reason);
    });
  </script>

    const { useState, useEffect, useMemo, useRef, Component } = React;

    const SUPABASE_URL = "https://edjrjqyxxikbvyerwbji.supabase.co";

    class ErrorBoundary extends Component {
      constructor(props) { super(props); this.state = { hasError: false }; }
      static getDerivedStateFromError(error) { return { hasError: true }; }

        if (this.state.hasError) {

    const generateId = () => Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    const formatThaiDate = (dateStr) => { 
        if(!dateStr) return ''; const d = new Date(dateStr); if (isNaN(d.getTime())) return dateStr;
        const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
        return `${String(d.getDate()).padStart(2,'0')} ${months[d.getMonth()]} ${d.getFullYear()+543}`; 
    };

    const QRCodeCanvas = ({ text, size }) => {
        const qrRef = useRef(null);
        useEffect(() => { if (window.QRious && qrRef.current && text) new window.QRious({ element: qrRef.current, value: text, size: size, level: 'H' }); }, [text, size]);
        return <canvas ref={qrRef} style={{ width: size, height: size }} className="rounded-lg shadow-sm border border-slate-100"></canvas>;
    };

    const calculateBMI = (weight, height, name = '') => {
        const w = parseFloat(weight); const h = parseFloat(height);
        if (isNaN(w) || isNaN(h) || h <= 0) return { bmi: 0, label: '-', color: 'text-slate-400', bg: 'bg-slate-100', gender: 'unknown' };
        let gender = 'unknown'; const safeName = name || '';
        if(safeName.startsWith('นาย') || safeName.startsWith('เด็กชาย') || safeName.startsWith('ด.ช.')) gender = 'ชาย';
        else if(safeName.startsWith('นาง') || safeName.startsWith('นางสาว') || safeName.startsWith('เด็กหญิง') || safeName.startsWith('ด.ญ.')) gender = 'หญิง';
        const hMeters = h / 100; const bmi = (w / (hMeters * hMeters)).toFixed(1);
        let label = 'ผอมเกินไป'; let color = 'text-blue-600'; let bg = 'bg-blue-100';
        if (bmi >= 18.5 && bmi <= 22.9) { label = 'สมส่วน'; color = 'text-emerald-600'; bg = 'bg-emerald-100'; }
        else if (bmi >= 23 && bmi <= 24.9) { label = 'น้ำหนักเกิน'; color = 'text-amber-600'; bg = 'bg-amber-100'; }
        else if (bmi >= 25 && bmi <= 29.9) { label = 'อ้วน'; color = 'text-orange-600'; bg = 'bg-orange-100'; }
        else if (bmi >= 30) { label = 'อ้วนมาก'; color = 'text-red-600'; bg = 'bg-red-100'; }
        return { bmi, label, color, bg, gender };
    };

    let globalAudioContext = null;
    const playSound = (type) => {
      try {
        if (!globalAudioContext) globalAudioContext = new (window.AudioContext || window.webkitAudioContext)();
        const ctx = globalAudioContext; if (ctx.state === 'suspended') ctx.resume();
        const osc = ctx.createOscillator(); const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        if (type === 'success') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.1);
          gain.gain.setValueAtTime(0.3, ctx.currentTime); gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.3);
        } else if (type === 'tap') {
          osc.type = 'sine'; osc.frequency.setValueAtTime(600, ctx.currentTime);
          gain.gain.setValueAtTime(0.1, ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
          osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.05);
        }
      } catch(e) {}
    };

    const isActive = (s) => !s.status || s.status === 'active';

    // 🟢 ระบบบันทึกข้อมูลด้วย Supabase (มีแจ้งเตือน Error ชัดเจน)
    const syncToCloud = async (action, room, payload, callback) => {
        try {
            if (SUPABASE_URL === "YOUR_SUPABASE_URL") {
                if(callback) callback(); return; 
            }

            let typeStr = '';
            if (action === 'saveSettings') typeStr = 'settings';
            else if (action === 'saveStudents') typeStr = 'students';
            else if (action === 'saveAttendance') typeStr = 'records';
            else if (action === 'saveFunds') typeStr = 'funds';
            else if (action === 'saveHealth') typeStr = 'health';

            // บันทึก/อัปเดตข้อมูล (Upsert)
            const { error } = await supabase
                .from('classflow_data')
                .upsert({ room: room, type: typeStr, payload: payload }, { onConflict: 'room, type' });

            if (error) {
                console.error("Supabase Error Detail:", error);
                throw new Error(error.message);
            }
            if(callback) callback();
        } catch(err) {
            console.error("Sync Error:", err);
            window.showGlobalToast(`บันทึกข้อมูลไม่สำเร็จ: ${err.message}`, 'error');
            if(callback) callback();
        }
    };

                    <div className="text-center mb-5">
                        <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-3 text-2xl ${dialog.type === 'alert' ? 'bg-amber-100 text-amber-500' : 'bg-blue-100 text-blue-500'}`}>
                            <i className={`fas ${dialog.type === 'alert' ? 'fa-exclamation' : 'fa-question'}`}></i>

                        {dialog.message && <p className="text-sm text-slate-500 mt-2 whitespace-pre-line">{dialog.message}</p>}
                    </div>
                    {dialog.type === 'prompt' && (
                        <div className="mb-5">
                            <input type={dialog.inputType || 'text'} autoFocus value={inputValue} onChange={e=>setInputValue(e.target.value)} placeholder={dialog.placeholder || ''} className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 text-center font-bold" />
                        </div>
                    )}
                    <div className="flex gap-2">
                        {dialog.type !== 'alert' && <button onClick={closeDialog} className="flex-1 py-3 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200">ยกเลิก</button>}
                        <button onClick={handleConfirm} className={`flex-1 py-3 text-white font-bold rounded-xl shadow-md ${dialog.type === 'alert' ? 'bg-amber-500' : (dialog.confirmColor || 'bg-blue-600')}`}>ตกลง</button>
                    </div>
                </div>
            </div>
        );
    };

    const PrintModeToggle = ({ pdfMode, setPdfMode }) => (
        <div className="flex items-center justify-end mb-3 gap-2">
            <span className="text-xs font-bold text-slate-500">โหมดพิมพ์:</span>

            <button onClick={() => setPdfMode('bw')} className={`px-4 py-1.5 rounded-md text-[11px] font-bold border transition-colors ${pdfMode === 'bw' ? 'bg-slate-800 text-white border-slate-800' : 'bg-slate-50 text-slate-400 border-slate-200'}`}>ขาวดำ</button>
        </div>

    const LoginPage = ({ onLogin, availableRooms, savedSession, onClearSession, showDialog }) => {

                          <i className={`fas ${savedSession.role === 'admin' ? 'fa-shield-alt' : 'fa-user-graduate'} text-4xl`}></i>
                      </div>
                      <h2 className="text-2xl font-black text-slate-800 mb-1">ยินดีต้อนรับกลับมา</h2>
                      <p className="text-slate-500 text-sm mb-8">{savedSession.role === 'admin' ? 'โหมดผู้ดูแลระบบ' : `ห้อง ${savedSession.room}`}</p>
                      <button onClick={() => onLogin(savedSession, true)} className="w-full py-4 bg-[#6d28d9] text-white rounded-2xl font-bold shadow-lg active:scale-95 transition-all hover:bg-[#5b21b6] relative z-20">เข้าสู่ระบบต่อด้วยบัญชีนี้</button>
                  </div>
              </div>
          );
      }

      const handleLogin = (e) => {
        e.preventDefault();
        if (role === 'admin') {
            if(pin) onLogin({ role: 'admin', room: null, pin: pin }, rememberMe);
            else showDialog({type: 'alert', title: 'แจ้งเตือน', message: 'กรุณาใส่รหัสผ่านแอดมิน'});
        } else {
            if (!room) showDialog({type: 'alert', title: 'แจ้งเตือน', message: 'ไม่พบห้องเรียน กรุณาติดต่อแอดมินเพื่อเพิ่มห้องในระบบ'});
            else if (pin) onLogin({ role: 'head', room, pin: pin }, rememberMe);
            else showDialog({type: 'alert', title: 'แจ้งเตือน', message: 'กรุณาใส่รหัส PIN ห้อง'});
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center bg-slate-50 relative overflow-hidden">
            <div className="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-blue-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-pulse pointer-events-none"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-purple-400 rounded-full mix-blend-multiply filter blur-[100px] opacity-20 animate-pulse pointer-events-none" style={{animationDelay: '2s'}}></div>

            <div className="max-w-5xl w-full bg-white lg:rounded-[36px] lg:shadow-2xl flex flex-col lg:flex-row overflow-hidden z-10 min-h-screen lg:min-h-[600px] animate-in fade-in zoom-in duration-500">
              <div className="w-full lg:w-5/12 bg-gradient-to-br from-[#6d28d9] via-blue-600 to-purple-700 p-10 text-white flex flex-col justify-between relative overflow-hidden hidden lg:flex">
                <div className="absolute top-0 right-0 w-64 h-64 bg-white opacity-10 rounded-full transform translate-x-1/2 -translate-y-1/2 pointer-events-none"></div>
                <div className="relative z-10">
                  <div className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mb-6 backdrop-blur-md shadow-lg"><i className="fas fa-layer-group text-3xl"></i></div>
                  <h2 className="text-xs font-bold text-blue-200 tracking-widest mb-2 uppercase">Welcome to</h2>
                  <h1 className="text-5xl font-black mb-4 leading-tight">ClassFlow</h1>
                  <p className="text-blue-100 mb-10 text-base font-normal">ระบบบริหารจัดการชั้นเรียนครบวงจร</p>
                  
                  <div className="space-y-4">
                    <div className="flex items-center gap-4 bg-white/10 p-4 rounded-2xl backdrop-blur-sm"><div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shrink-0"><i className="fas fa-clipboard-check text-blue-200"></i></div><div><h3 className="font-bold text-sm">เช็คชื่อกิจกรรม</h3><p className="text-blue-100 text-[11px] mt-0.5">รองรับหลายกิจกรรม ส่งออก PDF สะอาดตา</p></div></div>
                    <div className="flex items-center gap-4 bg-white/10 p-4 rounded-2xl backdrop-blur-sm"><div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shrink-0"><i className="fas fa-wallet text-emerald-300"></i></div><div><h3 className="font-bold text-sm">จัดการกองทุนห้อง</h3><p className="text-blue-100 text-[11px] mt-0.5">ระบบติดตามการเก็บเงิน แยกโอน/สด</p></div></div>
                    <div className="flex items-center gap-4 bg-white/10 p-4 rounded-2xl backdrop-blur-sm"><div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center shrink-0"><i className="fas fa-weight-scale text-rose-300"></i></div><div><h3 className="font-bold text-sm">ข้อมูลสุขภาพ</h3><p className="text-blue-100 text-[11px] mt-0.5">บันทึกและประมวลผล BMI อัตโนมัติ</p></div></div>
                  </div>
                </div>
              </div>

              <div className="w-full lg:w-7/12 p-6 md:p-12 flex flex-col justify-center bg-white relative flex-1">
                <div className="max-w-md w-full mx-auto relative z-20">
                  <div className="lg:hidden text-center mb-8">

                        </div>
                        <div className="flex-1">
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">ถึงวันที่</label>
                            <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm font-bold outline-none focus:border-[#6d28d9]" />
                        </div>
                        <div className="flex-[2]">
                            <label className="block text-[10px] font-bold text-slate-500 mb-1">ค้นหา (ชื่อ / รหัส)</label>
                            <input type="text" placeholder="พิมพ์ชื่อนักเรียน..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="w-full p-2.5 rounded-lg border border-slate-300 text-sm font-bold outline-none focus:border-[#6d28d9]" />
                        </div>
                    </div>
                    <div className="overflow-x-auto">
                        <table className="w-full text-sm text-left border border-slate-200">
                            <thead className="text-xs text-slate-500 bg-slate-100 uppercase border-b border-slate-200">
                                <tr><th className="px-4 py-3">เลขที่/รหัส</th><th className="px-4 py-3">ชื่อ - สกุล</th><th className="px-4 py-3 text-center text-emerald-600">มา</th><th className="px-4 py-3 text-center text-red-500">ขาด</th><th className="px-4 py-3 text-center text-blue-500">ลา</th></tr>
                            </thead>
                            <tbody>
                                {(() => {
                                    const filteredRecords = records.filter(r => r.date >= startDate && r.date <= endDate && (r.activity || 'หน้าเสาธง') === historyActivity);
                                    let stats = {};
                                    sortedStudents.forEach(s => { if(isActive(s)) stats[s.id] = { p:0, a:0, e:0 }; });
                                    filteredRecords.forEach(rec => {
                                        if(!rec.data) return;
                                        Object.keys(rec.data).forEach(sid => {
                                            if(!stats[sid]) return;
                                            if(rec.data[sid] === 'present') stats[sid].p++;
                                            else if(rec.data[sid] === 'absent') stats[sid].a++;
                                            else if(rec.data[sid] === 'excused') stats[sid].e++;
                                        });
                                    });
                                    const displayList = sortedStudents.filter(s => isActive(s) && (s.name.includes(searchQuery) || ((s.code||'').includes(searchQuery))));
                                    if(displayList.length === 0) return <tr><td colSpan="5" className="text-center py-8 text-slate-400">ไม่พบข้อมูล</td></tr>;
                                    return displayList.map(s => (
                                        <tr key={s.id} className="border-b border-slate-100 hover:bg-slate-50">
                                            <td className="px-4 py-3 font-medium text-slate-500">{s.number} <span className="text-[10px] bg-slate-200 px-1 rounded ml-1">{s.code}</span></td>
                                            <td className="px-4 py-3 font-bold text-slate-700">{s.name}</td>
                                            <td className="px-4 py-3 text-center font-black text-emerald-600">{stats[s.id].p}</td>
                                            <td className="px-4 py-3 text-center font-black text-red-500">{stats[s.id].a}</td>
                                            <td className="px-4 py-3 text-center font-black text-blue-500">{stats[s.id].e}</td>
                                        </tr>
                                    ));
                                })()}
                            </tbody>
                        </table>
                    </div>
                </div>
            )}
            
            {dashTab === 'fundStatus' && (
                <div className="bg-white p-6 rounded-[24px] shadow-sm border border-slate-100 animate-in fade-in">
                    <h3 className="font-black text-slate-800 mb-4"><i className="fas fa-search-dollar text-amber-500 mr-2"></i> ตรวจสอบสถานะกองทุน</h3>
                    {funds.length === 0 ? <p className="text-slate-500 text-center py-8">ยังไม่มีแคมเปญกองทุน</p> : (
                        <div>
                            <div className="flex flex-col sm:flex-row gap-3 mb-6">
                                <select value={fundHistoryId} onChange={e=>setFundHistoryId(e.target.value)} className="p-3 bg-slate-50 border border-slate-200 rounded-xl text-sm font-bold flex-1 outline-none">
                                    {funds.map(f => <option key={f.id} value={f.id}>{f.title} (เป้าหมาย {f.amount}฿)</option>)}
                                </select>
                                <input type="text" placeholder="ค้นหาชื่อ..." value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} className="p-3 bg-white border border-slate-200 rounded-xl text-sm font-bold outline-none flex-[2]" />
                            </div>

                            {(() => {
                                const selectedFund = funds.find(f => f.id === fundHistoryId) || funds[0];
                                if (!selectedFund) return null;
                                let cashTotal = 0; let transferTotal = 0;
                                Object.keys(selectedFund.payments || {}).forEach(sid => {
                                    const s = sortedStudents.find(st => st.id === sid);
                                    if(!s || !isActive(s)) return;
                                    const pData = selectedFund.payments[sid];
                                    let amt = 0; let method = 'cash';
                                    if(typeof pData === 'object') { amt = parseFloat(pData.amount)||0; method = pData.method || 'cash'; }
                                    else if (typeof pData === 'number') { amt = pData; method = 'cash'; }
                                    
                                    if (method === 'cash') cashTotal += amt;
                                    else if (method === 'transfer') transferTotal += amt;
                                });

                                return (
                                    <div className="grid grid-cols-3 gap-2 sm:gap-4 mb-6">
                                        <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-3 text-center">
                                            <p className="text-[10px] font-bold text-emerald-600 mb-0.5">รวมเงินสด</p>
                                            <p className="text-lg font-black text-emerald-700">{cashTotal} ฿</p>
                                        </div>
                                        <div className="bg-blue-50 border border-blue-100 rounded-xl p-3 text-center">
                                            <p className="text-[10px] font-bold text-blue-600 mb-0.5">รวมเงินโอน</p>
                                            <p className="text-lg font-black text-blue-700">{transferTotal} ฿</p>
                                        </div>
                                        <div className="bg-amber-50 border border-amber-100 rounded-xl p-3 text-center">
                                            <p className="text-[10px] font-bold text-amber-600 mb-0.5">ยอดรวมทั้งหมด</p>
                                            <p className="text-lg font-black text-amber-700">{cashTotal + transferTotal} ฿</p>
                                        </div>
                                    </div>
                                );
                            })()}

                            <div className="overflow-x-auto">
                                <table className="w-full text-sm text-left border border-slate-200">
                                    <thead className="text-xs text-slate-500 bg-slate-100 uppercase border-b border-slate-200">
                                        <tr><th className="px-4 py-3">เลขที่/รหัส</th><th className="px-4 py-3">ชื่อ - สกุล</th><th className="px-4 py-3">ยอดที่จ่าย</th><th className="px-4 py-3">สถานะ</th></tr>
                                    </thead>
                                    <tbody>
                                        {(() => {
                                            const f = funds.find(f => f.id === fundHistoryId) || funds[0];
                                            if(!f) return null;
                                            const displayList = sortedStudents.filter(s => isActive(s) && ((s.name || '').includes(searchQuery) || ((s.code||'').includes(searchQuery))));
                                            if(displayList.length === 0) return <tr><td colSpan="4" className="text-center py-8 text-slate-400">ไม่พบข้อมูล</td></tr>;
                                            return displayList.map(s => {
                                                const pData = (f.payments || {})[s.id];
                                                let paid = 0; let method = 'cash';
                                                if (typeof pData === 'object' && pData !== null) { paid = pData.amount || 0; method = pData.method || 'cash';}
                                                else if (typeof pData === 'number') paid = pData;
                                                const target = parseFloat(f.amount) || 0;
                                                return (
                                                    <tr key={s.id} className="border-b border-slate-200 hover:bg-slate-50">
                                                        <td className="px-4 py-3 font-medium text-slate-500">{s.number}</td>
                                                        <td className="px-4 py-3 font-bold text-slate-700">{s.name}</td>
                                                        <td className="px-4 py-3 font-bold text-slate-800">
                                                            {paid} <span className="text-xs text-slate-400 font-normal">/ {target}</span>
                                                            <span className={`ml-2 text-[10px] px-1.5 py-0.5 rounded font-bold ${method==='transfer' ? 'bg-blue-100 text-blue-600' : 'bg-emerald-100 text-emerald-600'}`}>({method==='transfer'?'โอน':'สด'})</span>
                                                        </td>
                                                        <td className="px-4 py-3">{paid >= target ? <span className="px-2 py-1 bg-emerald-100 text-emerald-700 rounded-md text-[10px] font-bold">จ่ายครบ</span> : <span className="px-2 py-1 bg-red-100 text-red-700 rounded-md text-[10px] font-bold">ค้างจ่าย</span>}</td>
                                                    </tr>
                                                );
                                            });
                                        })()}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}
                </div>
            )}
          </div>
        );
    };

    const TabAttendance = ({ sortedStudents, activeStudentsCount, records, setRecords, currentDate, setCurrentDate, activities, setActivities, attPrintSettings, setAttPrintSettings, exportExcel, showToast, showDialog, isAdmin, pdfMode, setPdfMode, userRoom }) => {
        const [attTab, setAttTab] = useState('manual'); 
        const [currentActivity, setCurrentActivity] = useState(activities[0] || 'หน้าเสาธง');
        
        const [attendance, setAttendance] = useState({}); 
        const [tempNotes, setTempNotes] = useState({});
        const [isLocked, setIsLocked] = useState(false);
        const [isSaving, setIsSaving] = useState(false);

        const effectiveLocked = isAdmin ? true : isLocked;

        useEffect(() => {
            const safeRecords = Array.isArray(records) ? records : [];
            const existRecord = safeRecords.find(r => r && r.date === currentDate && (r.activity || 'หน้าเสาธง') === currentActivity);
            if (existRecord) { 
                setAttendance(existRecord.data || {}); setTempNotes(existRecord.notes || {}); setIsLocked(true);
            } else { 
                try {
                    const draftStr = localStorage.getItem(`rc_pro_draft_${currentDate}_${currentActivity}`);
                    if (draftStr) { const draft = JSON.parse(draftStr); setAttendance(draft.attendance || {}); setTempNotes(draft.notes || {}); }
                    else { setAttendance({}); setTempNotes({}); }
                } catch(e){ setAttendance({}); setTempNotes({}); }
                setIsLocked(false);
            }
        }, [currentDate, currentActivity, records]);

        useEffect(() => { if (!isLocked && !isAdmin) localStorage.setItem(`rc_pro_draft_${currentDate}_${currentActivity}`, JSON.stringify({ attendance, notes: tempNotes })); }, [attendance, tempNotes, isLocked, isAdmin, currentDate, currentActivity]);

        let p=0, a=0, e=0;
        sortedStudents.forEach(s => { if(isActive(s)) { const st = attendance[s.id]; if(st==='present') p++; else if(st==='absent') a++; else if(st==='excused') e++; }});

        const toggleAll = () => {
            if (effectiveLocked) return; playSound('tap');
            const allPresent = activeStudentsCount > 0 && sortedStudents.filter(isActive).every(s => attendance[s.id] === 'present');
            if(allPresent) setAttendance({}); 
            else { const newAtt = {...attendance}; sortedStudents.forEach(s => { if(isActive(s)) newAtt[s.id] = 'present'; }); setAttendance(newAtt); }
        };

        const handleAddActivity = () => {
             if(isAdmin) return;
             showDialog({
                 type: 'prompt', title: 'เพิ่มกิจกรรมใหม่', placeholder: 'เช่น กีฬาสี, โฮมรูม',
                 onConfirm: (val) => {
                     if(val && val.trim() && !activities.includes(val.trim())) {
                         const finalAct = val.trim();
                         setActivities(prev => [...prev, finalAct]);
                         setCurrentActivity(finalAct);
                         showToast('เพิ่มกิจกรรมแล้ว', 'success');
                     }
                 }
             })
        };

        const saveAtt = () => {
            if(isAdmin) return;
            const activeS = sortedStudents.filter(isActive);
            const checkedCount = activeS.filter(s => attendance[s.id]).length;
            if (checkedCount < activeStudentsCount) { showToast(`ยังเช็คไม่ครบ (ขาดอีก ${activeStudentsCount - checkedCount} คน)`, 'warning'); return; }
            
            setIsSaving(true);
            const newRecord = { id: generateId(), date: currentDate, activity: currentActivity, timestamp: new Date().toISOString(), data: attendance, notes: tempNotes };
            
            const updatedRecords = [...records.filter(r => !(r.date === currentDate && (r.activity || 'หน้าเสาธง') === currentActivity)), newRecord];
            setRecords(updatedRecords);
            
            syncToCloud('saveAttendance', userRoom, newRecord, () => {
                setIsLocked(true); 
                localStorage.removeItem(`rc_pro_draft_${currentDate}_${currentActivity}`);
                setIsSaving(false);
                playSound('success');
            });
        };

        useEffect(() => {
            let html5QrCode;
            if (attTab === 'scan' && !isAdmin) {
                html5QrCode = new Html5Qrcode("qr-reader");
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } },
                    (decodedText) => {
                        const student = sortedStudents.find(s => s.code === decodedText || s.id === decodedText);
                        if (student && isActive(student)) {
                            setAttendance(prev => {
                                if(prev[student.id] !== 'present') {
                                    playSound('success'); showToast(`สแกนผ่าน: ${student.name}`, 'success');
                                    return {...prev, [student.id]: 'present'};
                                }
                                return prev;
                            });
                        }
                    }, (errorMessage) => {}
                ).catch((err) => { showToast("ไม่สามารถเปิดกล้องได้", 'error'); });
            }
            return () => { if (html5QrCode && html5QrCode.isScanning) html5QrCode.stop().then(() => html5QrCode.clear()).catch(e=>{}); };
        }, [attTab, sortedStudents, showToast, setAttendance, isAdmin]);

        return (
          <div className="animate-in fade-in space-y-4 max-w-[600px] mx-auto">
             {!isAdmin && (
             <div className="flex bg-white p-1 rounded-xl shadow-sm border border-slate-100">
                 <button onClick={()=>{playSound('tap'); setAttTab('manual');}} className={`flex-1 py-2.5 rounded-lg text-[13px] font-bold transition-all ${attTab === 'manual' ? 'bg-[#f4ebff] text-[#6d28d9] shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fas fa-list-ul mr-1"></i> เช็คชื่อรายบุคคล</button>
                 <button onClick={()=>{playSound('tap'); setAttTab('scan');}} className={`flex-1 py-2.5 rounded-lg text-[13px] font-bold transition-all ${attTab === 'scan' ? 'bg-[#f4ebff] text-[#6d28d9] shadow-sm' : 'text-slate-500 hover:bg-slate-50'}`}><i className="fas fa-qrcode mr-1"></i> สแกนกล้อง</button>
             </div>
             )}

             <div className="bg-white p-4 md:p-5 rounded-[20px] shadow-sm border border-slate-100">
                 <div className="flex flex-col sm:flex-row justify-between items-start mb-4 gap-3">
                     <div className="flex items-center gap-3 w-full sm:w-auto">
                         <div className="w-10 h-10 bg-[#6d28d9] text-white rounded-xl flex items-center justify-center shadow-sm shrink-0"><i className="fas fa-calendar-check"></i></div>
                         <div className="flex-1">
                             <div className="flex items-center gap-2">
                                <span className="text-[14px] font-black text-slate-800">เช็คชื่อ:</span>
                                <div className="relative border border-slate-200 rounded-md bg-slate-50 flex items-center pr-1 flex-1 sm:flex-none max-w-[150px]">
                                    <select value={currentActivity} onChange={e=>{playSound('tap'); setCurrentActivity(e.target.value);}} className="text-[14px] font-black text-[#6d28d9] bg-transparent outline-none cursor-pointer w-full p-1 pl-2 appearance-none">
                                        {activities.map(a => <option key={a} value={a}>{a}</option>)}
                                    </select>
                                    <i className="fas fa-chevron-down text-slate-400 text-[10px] pointer-events-none absolute right-2"></i>
                                </div>
                                {!isAdmin && <button onClick={handleAddActivity} className="w-7 h-7 bg-white border border-slate-200 shadow-sm text-[#6d28d9] rounded-md flex items-center justify-center hover:bg-slate-50 shrink-0"><i className="fas fa-plus text-xs"></i></button>}
                             </div>
                             <p className="text-[11px] text-slate-400 font-bold mt-1">รวมนักเรียนปกติ {activeStudentsCount} คน</p>
                         </div>
                     </div>
                     <div className="relative self-start sm:self-center w-full sm:w-auto text-right">
                        <div className="bg-[#f4ebff] text-[#6d28d9] px-3 py-2 rounded-lg text-xs font-bold shadow-sm cursor-pointer whitespace-nowrap inline-block border border-purple-100"><i className="fas fa-calendar-alt mr-1"></i> {formatThaiDate(currentDate)}</div>
                        <input type="date" value={currentDate} onChange={e=>{playSound('tap'); setCurrentDate(e.target.value);}} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                     </div>
                 </div>

                 <div className="grid grid-cols-3 gap-2 mb-3">
                     <div className="bg-[#ecfdf3] text-[#10b981] border border-[#d1fae5] rounded-xl py-2 text-center font-bold text-sm">มา {p}</div>
                     <div className="bg-[#fef2f2] text-[#ef4444] border border-[#fee2e2] rounded-xl py-2 text-center font-bold text-sm">ขาด {a}</div>
                     <div className="bg-[#eff6ff] text-[#3b82f6] border border-[#dbeafe] rounded-xl py-2 text-center font-bold text-sm">ลา {e}</div>
                 </div>
                 
                 {!isAdmin && (
                 <div className="flex gap-2 mb-3">
                     <button onClick={toggleAll} disabled={isLocked} className={`flex-1 py-2.5 border rounded-xl font-bold text-xs transition-all flex items-center justify-center gap-1.5 ${isLocked ? 'bg-slate-50 border-slate-100 text-slate-400' : 'bg-white border-slate-200 text-slate-600 hover:bg-slate-50'}`}><i className="fas fa-check-double"></i> มาครบทุกคน</button>
                     {isLocked ? (
                         <button onClick={() => {playSound('tap'); setIsLocked(false);}} className="flex-[1.5] py-2.5 bg-[#1e293b] text-white rounded-xl font-bold text-xs shadow-md hover:bg-black transition-all"><i className="fas fa-lock mr-1 text-slate-300"></i> บันทึกแล้ว (กดแก้)</button>
                     ) : (
                         <button onClick={saveAtt} disabled={isSaving} className={`flex-[1.5] py-2.5 text-white rounded-xl font-bold text-xs shadow-md transition-all ${isSaving ? 'bg-[#8b5cf6] opacity-70' : 'bg-[#6d28d9] hover:bg-[#5b21b6]'}`}>
                             {isSaving ? <i className="fas fa-spinner fa-spin mr-1"></i> : <i className="fas fa-cloud-upload-alt mr-1"></i>} บันทึกข้อมูล
                         </button>
                     )}
                 </div>
                 )}

                 <div className="pt-3 border-t border-slate-100 border-dashed">
                    <PrintModeToggle pdfMode={pdfMode} setPdfMode={setPdfMode} />
                    <div className="grid grid-cols-2 gap-2">
                        <button onClick={() => {playSound('tap'); setAttPrintSettings({ show: true, filterType: 'all', selectedIds: [], activity: currentActivity });}} className="py-2.5 bg-red-50/50 text-red-600 rounded-xl text-[12px] font-bold hover:bg-red-50 transition border border-red-100/50"><i className="fas fa-file-pdf mr-1"></i> พิมพ์ใบเช็คชื่อ PDF</button>
                        <button onClick={() => exportExcel('attendance', currentActivity)} className="py-2.5 bg-green-50/50 text-green-600 rounded-xl text-[12px] font-bold hover:bg-green-50 transition border border-green-100/50"><i className="fas fa-file-excel mr-1"></i> ดาวน์โหลด Excel</button>
                    </div>
                 </div>
             </div>

             {attTab === 'scan' && !isAdmin ? (
                 <div className="bg-white p-6 rounded-[20px] shadow-sm border border-slate-100 text-center">
                     <h3 className="font-black text-slate-800 mb-4">หันกล้องไปที่ QR Code ของนักเรียน</h3>
                     <div id="qr-reader"></div>
                 </div>
             ) : (
                 <div className="space-y-2.5 mt-2 pb-10">
                    {sortedStudents.length === 0 ? <p className="text-center text-slate-400 text-sm py-8 border border-dashed rounded-xl border-slate-200">ไม่มีรายชื่อนักเรียน</p> : 
                     sortedStudents.map(s => {
                        const active = isActive(s);
                        const st = attendance[s.id];
                        const setDirectStatus = (status) => { if (effectiveLocked || !active) return; playSound('tap'); setAttendance(prev => ({...prev, [s.id]: prev[s.id] === status ? undefined : status})); };

                        return (
                            <div key={s.id} className={`bg-white p-3 rounded-[16px] shadow-[0_2px_8px_rgba(0,0,0,0.02)] border border-slate-100 flex flex-col sm:flex-row sm:items-center justify-between gap-2 hover:border-[#6d28d9] transition-colors ${!active ? 'opacity-60 bg-slate-50' : ''}`}>
                                <div className="flex items-center gap-3">
                                    <div className="w-6 h-6 bg-slate-100 text-slate-500 rounded-full flex items-center justify-center font-bold text-[10px] shrink-0">{s.number || ''}</div>
                                    <div className="w-10 h-10 rounded-lg bg-slate-100 border border-slate-200 overflow-hidden shrink-0 flex items-center justify-center">
                                        {s.image ? <img src={s.image} className="w-full h-full object-cover" /> : <i className="fas fa-user text-slate-300 text-sm"></i>}
                                    </div>
                                    <div className="flex flex-col">
                                        <p className="font-bold text-slate-800 text-[14px]">
                                            <span>{s.name || ''}</span>
                                            {!active && <span className="text-[10px] font-bold bg-red-100 text-red-600 px-2 py-0.5 rounded ml-2">{s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน'}</span>}
                                        </p>
                                        {!effectiveLocked && active && (st === 'absent' || st === 'excused') && (
                                            <div className="flex items-center gap-1 mt-1 text-slate-400 w-full">
                                                <i className="fas fa-comment-dots text-[9px]"></i>
                                                <input type="text" placeholder="พิมพ์หมายเหตุ..." value={tempNotes[s.id]||''} onChange={e=>setTempNotes(p=>({...p, [s.id]: e.target.value}))} className="text-[11px] bg-transparent outline-none w-full max-w-[180px] border-b border-slate-200 pb-0.5 focus:border-[#6d28d9] text-slate-600" />
                                            </div>
                                        )}
                                        {isAdmin && tempNotes[s.id] && <p className="text-[11px] text-slate-500 mt-1"><i className="fas fa-comment-dots text-[9px]"></i> {tempNotes[s.id]}</p>}
                                    </div>
                                </div>
                                <div className="flex bg-slate-50/80 p-1 rounded-[10px] shrink-0 self-end sm:self-auto border border-slate-100 mt-2 sm:mt-0">
                                    <button onClick={() => setDirectStatus('present')} disabled={effectiveLocked || !active} className={`w-[45px] py-1.5 rounded-lg text-[11px] font-bold transition-all ${st==='present'?'bg-[#10b981] text-white shadow-sm':'text-slate-400 hover:bg-white'} ${!active || effectiveLocked ? 'cursor-not-allowed opacity-50' : ''}`}>มา</button>
                                    <button onClick={() => setDirectStatus('absent')} disabled={effectiveLocked || !active} className={`w-[45px] py-1.5 rounded-lg text-[11px] font-bold transition-all ${st==='absent'?'bg-[#ef4444] text-white shadow-sm':'text-slate-400 hover:bg-white'} ${!active || effectiveLocked ? 'cursor-not-allowed opacity-50' : ''}`}>ขาด</button>

             if(isAdmin) return;
             if(!newBulk.trim()) return; playSound('tap');
             const lines = newBulk.split('\n');

             setStudents(prev => {

    const TabSettings = ({ settings, setSettings, showToast, user, onUpdatePin, showDialog }) => {

                     <h3 className="font-black text-sm text-slate-800 mb-4"><i className="fas fa-cog text-slate-500 mr-1"></i> ตั้งค่าระบบสำหรับหัวหน้าห้อง</h3>
                     <div className="space-y-4">
                        <div>

                            <input type="password" placeholder="••••••" value={confirmPin} onChange={e=>setConfirmPin(e.target.value)} className="w-full p-3 bg-white border border-blue-200 rounded-lg font-medium text-xs outline-none focus:border-blue-500 text-center tracking-widest text-lg" />

                            }} className="w-full py-3 bg-blue-600 text-white font-bold rounded-lg text-xs hover:bg-blue-700 transition-colors relative z-20">ยืนยันการเปลี่ยนรหัส</button>

                            <p className="text-[10px] text-slate-500 mt-1">หากพบปัญหาการใช้งาน หรือต้องการแก้ไขข้อมูลสำคัญ<br/>กรุณาติดต่อผู้ดูแลระบบ (Admin) ของโรงเรียน</p>
                        </div>
                     </div>
                 </div>
             </div>
          )
      };

    const DashboardLayout = ({ user, onLogout, backToAdmin, onUpdateRoomPin, showDialog, globalSettings }) => {
      const roomKey = `cf_${user.room}_`;

      const safeLoad = (key, fallback, isArray = false) => {
          try {
              const d = localStorage.getItem(roomKey+key);
              if (!d) return fallback;
              const parsed = JSON.parse(d);
              if (isArray && !Array.isArray(parsed)) return fallback;
              if (!isArray && (typeof parsed !== 'object' || Array.isArray(parsed) || parsed === null)) return fallback;
              return parsed;
          } catch(e) { return fallback; }
      };
      
      const [settings, setSettings] = useState(() => safeLoad('settings', { roomName: user.room }, false));
      const [students, setStudents] = useState(() => safeLoad('students', [], true));
      const [records, setRecords] = useState(() => safeLoad('records', [], true));
      const [funds, setFunds] = useState(() => safeLoad('funds', [], true));
      const [healthRecords, setHealthRecords] = useState(() => safeLoad('healthRecords', [], true)); 
      const [activities, setActivities] = useState(() => safeLoad('activities', ['หน้าเสาธง'], true));

      const isAdmin = user.role === 'admin';
      
      const availableTabs = [
          { id: 'dashboard', icon: 'fa-chart-pie', label: 'ภาพรวมระบบ', show: true },
          { id: 'attendance', icon: 'fa-clipboard-check', label: 'เช็คชื่อกิจกรรม', show: true },
          { id: 'fund', icon: 'fa-wallet', label: 'กองทุนห้อง', show: true },
          { id: 'health', icon: 'fa-weight-scale', label: 'ข้อมูลสุขภาพ', show: true },
          { id: 'students', icon: 'fa-users-cog', label: 'จัดการรายชื่อ', show: true },
          { id: 'settings', icon: 'fa-cog', label: 'ตั้งค่า PIN ห้อง', show: !isAdmin }
      ];

      const [activeMenu, setActiveMenu] = useState('dashboard'); 
      const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false);
      
      const showToast = window.showGlobalToast; 

      const [isExporting, setIsExporting] = useState('');
      const [selectedQRStudent, setSelectedQRStudent] = useState(null);

      const [pdfMode, setPdfMode] = useState('color'); 
      const [attPrintSettings, setAttPrintSettings] = useState({ show: false, filterType: 'all', selectedIds: [], activity: 'หน้าเสาธง' });
      const [searchPrint, setSearchPrint] = useState('');

      // 🟢 ดึงข้อมูลตอนเปิดหน้า Dashboard จาก Supabase
      useEffect(() => {
          const loadDataFromCloud = async () => {
              if(SUPABASE_URL === "YOUR_SUPABASE_URL") return;
              setIsExporting('loading_cloud'); 
              try {
                  const { data, error } = await supabase
                      .from('classflow_data')
                      .select('type, payload')
                      .eq('room', user.room);
                  
                  if (error) throw error;
                  
                  if(data && data.length > 0) {
                      data.forEach(item => {
                          if(item.type === 'students') setStudents(item.payload || []);
                          if(item.type === 'records') setRecords(item.payload || []);
                          if(item.type === 'funds') setFunds(item.payload || []);
                          if(item.type === 'health') setHealthRecords(item.payload || []);
                      });
                  }
              } catch(e) {
                  showToast('ดึงข้อมูลจาก Cloud ล้มเหลว จะใช้ข้อมูลในเครื่องแทน', 'error');
              }
              setIsExporting('');
          };
          loadDataFromCloud();
      }, [user.room]);

      useEffect(() => {
        try {
            localStorage.setItem(roomKey+'settings', JSON.stringify(settings));
            localStorage.setItem(roomKey+'students', JSON.stringify(students || []));
            localStorage.setItem(roomKey+'records', JSON.stringify(records || []));
            localStorage.setItem(roomKey+'funds', JSON.stringify(funds || []));
            localStorage.setItem(roomKey+'healthRecords', JSON.stringify(healthRecords || []));
            localStorage.setItem(roomKey+'activities', JSON.stringify(activities || []));
        } catch(e) { }
      }, [students, records, funds, healthRecords, settings, activities, roomKey]);

      const [currentDate, setCurrentDate] = useState(() => new Date().toISOString().split('T')[0]);

      const safeStudents = (Array.isArray(students) ? students : []).filter(s => s && s.id);
      const safeFunds = (Array.isArray(funds) ? funds : []).filter(f => f && f.id);
      const safeRecords = (Array.isArray(records) ? records : []).filter(r => r && r.date);

      const sortedStudents = useMemo(() => {
          const grouped = {};
          safeStudents.forEach(s => {
              const g = (s.subgroup || '').trim();
              if(!grouped[g]) grouped[g] = [];
              grouped[g].push(s);
          });
          
          let finalSorted = [];
          Object.keys(grouped).sort().forEach(g => {
              let groupStudents = grouped[g].sort((a,b) => {
                  const codeA = parseInt(a.code) || 0; const codeB = parseInt(b.code) || 0;
                  if(codeA && codeB) return codeA - codeB;
                  return (a.name||'').localeCompare(b.name||'','th');
              });
              groupStudents = groupStudents.map((s, idx) => ({...s, number: idx + 1}));
              finalSorted = [...finalSorted, ...groupStudents];
          });
          return finalSorted;
      }, [safeStudents]);
      
      const activeStudentsCount = sortedStudents.filter(isActive).length;

      const pdfPrintChunks = useMemo(() => {
          const MAX_ROWS = 40;
          const groups = {};
          sortedStudents.forEach(s => {
              const g = (s.subgroup || '').trim();
              if(!groups[g]) groups[g] = [];
              groups[g].push(s);
          });
          
          const chunks = [];
          Object.keys(groups).forEach(g => {
              const rows = [];
              rows.push({ isHeader: true, title: g });
              groups[g].forEach(s => rows.push({ isStudent: true, ...s }));
              for (let i = 0; i < rows.length; i += MAX_ROWS) {
                  chunks.push(rows.slice(i, i + MAX_ROWS));
              }
          });
          return chunks;
      }, [sortedStudents]);

      const qrCodeChunks = useMemo(() => {
          const CARDS_PER_PAGE = 10;
          const chunks = [];
          for (let i = 0; i < sortedStudents.length; i += CARDS_PER_PAGE) {
              chunks.push(sortedStudents.slice(i, i + CARDS_PER_PAGE));
          }
          return chunks;
      }, [sortedStudents]);

      const attendancePrintChunks = useMemo(() => {
          const MAX_ROWS = 40;
          const groups = {};
          const filterType = attPrintSettings.filterType;
          const selectedIds = attPrintSettings.selectedIds;
          
          const targetActivity = attPrintSettings.activity || 'หน้าเสาธง';
          const targetRecord = safeRecords.find(r => r && r.date === currentDate && (r.activity || 'หน้าเสาธง') === targetActivity);
          const attData = targetRecord ? targetRecord.data : {};

          sortedStudents.forEach(s => {
              if (filterType !== 'all') {
                  const st = attData[s.id];
                  if (filterType === 'present' && st !== 'present') return;
                  if (filterType === 'absent' && st !== 'absent') return;
                  if (filterType === 'excused' && st !== 'excused') return;
                  if (filterType === 'specific' && !selectedIds.includes(s.id)) return;
              }

              const g = (s.subgroup || '').trim();
              if(!groups[g]) groups[g] = [];
              groups[g].push(s);
          });
          
          const chunks = [];
          Object.keys(groups).forEach(g => {
              if (groups[g].length === 0) return;
              const rows = [];
              rows.push({ isHeader: true, title: g });
              groups[g].forEach(s => rows.push({ isStudent: true, ...s }));
              for (let i = 0; i < rows.length; i += MAX_ROWS) {
                  chunks.push(rows.slice(i, i + MAX_ROWS));
              }
          });
          return chunks.length > 0 ? chunks : [[{isHeader: true, title: ''}]];
      }, [sortedStudents, safeRecords, currentDate, attPrintSettings]);

      const handleZoneCheckClick = () => {
          if(globalSettings?.zoneCheckUrl && globalSettings.zoneCheckUrl.trim() !== '') {
              let url = globalSettings.zoneCheckUrl;
              if (!url.startsWith('http://') && !url.startsWith('https://')) { url = 'https://' + url; }
              window.open(url, '_blank');
          } else { showToast('แอดมินยังไม่ได้ตั้งค่าลิงก์ ZoneCheck ในเมนูตั้งค่าส่วนกลาง', 'warning'); }
      };

      const executeDocExport = (type, containerId, filename) => {
          return new Promise((resolve) => {
              setIsExporting(containerId); window.scrollTo(0, 0); 
              setTimeout(async () => {
                  const element = document.getElementById(containerId);
                  const commonOpt = { scale: 2, useCORS: true, letterRendering: true, scrollY: 0, windowWidth: 794 };
                  
                  try {
                      if (type === 'pdf') {
                          await window.html2pdf().set({ 
                              margin: 0, 
                              filename: `${filename}.pdf`, 
                              image: { type: 'png' },
                              html2canvas: commonOpt, 
                              jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                          }).from(element).save();
                          showToast('โหลด PDF สำเร็จ', 'success');
                      }
                  } catch(e) { showToast("เกิดข้อผิดพลาดในการโหลด PDF", 'error'); }
                  
                  setIsExporting(''); 
                  resolve();
              }, 500);
          });
      };

      const executeExport = async (type) => {
          setIsExporting(type); window.scrollTo(0, 0); 
          try {
              setTimeout(async () => {
                  if (type === 'pdf_qr_selected') {
                      const element = document.getElementById('pdf-qr-container');
                      const commonOpt = { scale: 1.5, useCORS: true, letterRendering: true, scrollY: 0, windowWidth: 794 };
                      
                      await new Promise(r => setTimeout(r, 100));

                      await window.html2pdf().set({ 
                          margin: 0, 
                          filename: `บัตรนักเรียน_${settings?.roomName}.pdf`, 
                          image: { type: 'jpeg', quality: 0.98 }, 
                          html2canvas: commonOpt, 
                          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
                      }).from(element).save();
                      showToast('โหลดบัตร PDF สำเร็จ', 'success');
                  }
                  else if (type === 'pdf_single_qr') {
                      const element = document.getElementById('single-qr-card-content');
                      const canvas = await window.html2canvas(element, { scale: 3, useCORS: true, backgroundColor: '#ffffff' });
                      const link = document.createElement('a'); link.download = `บัตร_${selectedQRStudent?.name || 'Student'}.png`;
                      link.href = canvas.toDataURL('image/png'); link.click();
                      showToast('บันทึกรูปภาพสำเร็จ', 'success');
                  }
                  setIsExporting(''); 
              }, 500);
          } catch (error) { setIsExporting(''); showToast("เกิดข้อผิดพลาดในการดึงข้อมูล", 'error'); }
      };

      const exportExcel = (mode, dynamicParam = null) => {
          if(typeof XLSX === 'undefined') { showToast('ไม่พบไลบรารี Excel', 'error'); return; }
          let dataToExport = []; let filename = "";
          
          if(mode === 'attendance') {
              const targetRecord = safeRecords.find(r => r && r.date === currentDate && (r.activity || 'หน้าเสาธง') === dynamicParam);
              const attData = targetRecord ? targetRecord.data : {};
              const noteData = targetRecord ? targetRecord.notes : {};

              dataToExport = sortedStudents.map(s => {
                  let statusText = '-';
                  if(isActive(s)) {
                      const st = attData[s.id]; 
                      if(st === 'present') statusText = 'มา'; else if(st === 'absent') statusText = 'ขาด'; else if(st === 'excused') statusText = 'ลา'; else statusText = 'ยังไม่เช็ค';
                  } else { statusText = s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน'; }
                  return { "เลขที่": s.number || '', "เลขประจำตัว": s.code || s.id, "ชื่อ - นามสกุล": s.name || '', "แผนการเรียน": s.subgroup || '-', "สถานะ": statusText, "หมายเหตุ": noteData[s.id] || '' };
              });
              filename = `เช็คชื่อ_${dynamicParam}_${currentDate}_${settings?.roomName}.xlsx`;
          } else if(mode === 'health') {
              const hRec = healthRecords.find(r => r.date === dynamicParam) || { data: {} };
              const hDataMap = hRec.data || {};
              dataToExport = sortedStudents.map(s => {
                  const hData = hDataMap[s.id] || {w:'', h:''}; const bmiData = calculateBMI(hData.w, hData.h, s.name);
                  return { "เลขที่": s.number || '', "เลขประจำตัว": s.code || s.id, "ชื่อ - นามสกุล": s.name || '', "แผนการเรียน": s.subgroup || '-', "น้ำหนัก (กก.)": hData.w || '-', "ส่วนสูง (ซม.)": hData.h || '-', "ค่า BMI": !isActive(s) ? '-' : (bmiData.bmi > 0 ? bmiData.bmi : '-'), "ผลประเมิน": !isActive(s) ? '-' : (bmiData.bmi > 0 ? bmiData.label : '-'), "หมายเหตุ": !isActive(s) ? (s.status==='moved'?'ย้าย':'ไม่มีตัวตน') : '' };
              });
              filename = `สุขภาพ_BMI_${dynamicParam}_${settings?.roomName}.xlsx`;
          } else if(mode === 'students') {
              dataToExport = sortedStudents.map(s => ({ "เลขที่": s.number || '', "เลขประจำตัว": s.code || s.id, "ชื่อ - นามสกุล": s.name || '', "แผนการเรียน": s.subgroup || '-', "สถานะ": isActive(s) ? 'ปกติ' : (s.status==='moved'?'ย้าย':'ไม่มีตัวตน') }));
              filename = `รายชื่อนักเรียน_${settings?.roomName}.xlsx`;
          } else if(mode === 'fund') {
              const activeFundIdLocal = safeFunds[0]?.id;
              const fData = safeFunds.find(f => f.id === activeFundIdLocal) || safeFunds[0];
              if(!fData) { showToast('ไม่มีข้อมูลกองทุน', 'warning'); return; }
              dataToExport = sortedStudents.map(s => {
                  let paid = 0; let method = '-'; let target = 0; let status = '-';
                  if(isActive(s)) {
                      const paymentData = (fData.payments || {})[s.id];
                      method = 'เงินสด';
                      if (typeof paymentData === 'object' && paymentData !== null) { paid = paymentData.amount || 0; method = paymentData.method === 'transfer' ? 'โอน' : 'สด'; } 
                      else if (typeof paymentData === 'number') { paid = paymentData; }
                      target = parseFloat(fData.amount) || 0;
                      status = paid >= target ? 'จ่ายครบ' : 'ค้างจ่าย';
                  } else { status = s.status === 'moved' ? 'ย้าย' : 'ไม่มีตัวตน'; }
                  return { "เลขที่": s.number || '', "เลขประจำตัว": s.code || s.id, "ชื่อ - นามสกุล": s.name || '', "แผนการเรียน": s.subgroup || '-', "ยอดที่จ่าย (บาท)": paid, "ยอดเป้าหมาย (บาท)": target, "สถานะ": status, "ช่องทางการจ่าย": method };
              });
              filename = `กองทุน_${fData.title}_${settings?.roomName}.xlsx`;
          }

          const worksheet = XLSX.utils.json_to_sheet(dataToExport); const workbook = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1"); XLSX.writeFile(workbook, filename);
          showToast('โหลด Excel สำเร็จ', 'success');
      };

      const renderContent = () => {
        switch(activeMenu) {
          case 'dashboard': return <TabDashboard activeStudentsCount={activeStudentsCount} records={safeRecords} currentDate={currentDate} funds={safeFunds} sortedStudents={sortedStudents} activities={activities} />;
          case 'attendance': return <TabAttendance sortedStudents={sortedStudents} activeStudentsCount={activeStudentsCount} records={safeRecords} setRecords={setRecords} currentDate={currentDate} setCurrentDate={setCurrentDate} activities={activities} setActivities={setActivities} attPrintSettings={attPrintSettings} setAttPrintSettings={setAttPrintSettings} exportExcel={exportExcel} showToast={showToast} showDialog={showDialog} isAdmin={isAdmin} pdfMode={pdfMode} setPdfMode={setPdfMode} userRoom={user.room} />;
          case 'fund': return <TabFund funds={safeFunds} setFunds={setFunds} sortedStudents={sortedStudents} activeStudentsCount={activeStudentsCount} showToast={showToast} exportExcel={exportExcel} executeDocExport={executeDocExport} showDialog={showDialog} isAdmin={isAdmin} pdfMode={pdfMode} setPdfMode={setPdfMode} userRoom={user.room} />;
          case 'health': return <TabHealth healthRecords={healthRecords} setHealthRecords={setHealthRecords} sortedStudents={sortedStudents} exportExcel={exportExcel} executeDocExport={executeDocExport} showToast={showToast} showDialog={showDialog} isAdmin={isAdmin} pdfMode={pdfMode} setPdfMode={setPdfMode} userRoom={user.room} />;
          case 'students': return <TabStudents safeStudents={safeStudents} setStudents={setStudents} sortedStudents={sortedStudents} activeStudentsCount={activeStudentsCount} setSelectedQRStudent={setSelectedQRStudent} showToast={showToast} exportExcel={exportExcel} executeExport={executeExport} executeDocExport={executeDocExport} userPin={user.pin} settings={settings} showDialog={showDialog} isAdmin={isAdmin} pdfMode={pdfMode} setPdfMode={setPdfMode} userRoom={user.room} isExporting={isExporting} setIsExporting={setIsExporting} />;
          case 'settings': return <TabSettings settings={settings} setSettings={setSettings} showToast={showToast} user={user} onUpdatePin={(newPin) => onUpdateRoomPin(user.room, newPin)} showDialog={showDialog} />;
          default: return <TabDashboard activeStudentsCount={activeStudentsCount} records={safeRecords} currentDate={currentDate} funds={safeFunds} sortedStudents={sortedStudents} activities={activities} />;
        }
      };

      const handleUserLogout = () => {
          localStorage.removeItem('cf_auth_session'); 
          onLogout();
      }

      return (
        <div className="flex h-screen bg-bgLight overflow-hidden relative font-sans">
          <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-white border-r border-slate-200 shadow-xl transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static flex flex-col ${isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="h-16 flex items-center px-5 border-b border-slate-100 shrink-0">
              <div className="w-8 h-8 bg-[#6d28d9] rounded-lg text-white flex items-center justify-center text-sm shadow-sm mr-2"><i className="fas fa-layer-group"></i></div>
              <span className="text-xl font-black text-slate-800 tracking-tight">ClassFlow</span>
              <button onClick={() => setIsMobileMenuOpen(false)} className="lg:hidden ml-auto w-8 h-8 rounded-full bg-slate-50 text-slate-500 flex items-center justify-center"><i className="fas fa-times"></i></button>
            </div>
            <nav className="flex-1 overflow-y-auto py-4 px-3 space-y-1 custom-scrollbar">
              <p className="px-3 text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-2">เมนูการจัดการ</p>
              {availableTabs.filter(t=>t.show).map((item) => (
                <button key={item.id} onClick={() => { playSound('tap'); setActiveMenu(item.id); setIsMobileMenuOpen(false); }} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition-all font-bold text-xs ${activeMenu === item.id ? 'bg-[#f4ebff] text-[#6d28d9]' : 'text-slate-500 hover:bg-slate-50'}`}>
                  <div className={`w-5 text-center ${activeMenu === item.id ? 'text-[#6d28d9]' : 'text-slate-400'}`}><i className={`fas ${item.icon}`}></i></div>{item.label}
                </button>
              ))}
              <div className="pt-3 mt-2 border-t border-slate-100">
                  <button onClick={handleZoneCheckClick} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl font-bold text-xs text-emerald-600 bg-emerald-50 hover:bg-emerald-100">
                      <div className="w-5 text-center"><i className="fas fa-star"></i></div>ดูคะแนนเขต/ห้อง
                  </button>
              </div>
            </nav>
            <div className="p-4 border-t border-slate-100 shrink-0 space-y-2">
              <div className="text-center pb-2">
                  <p className="text-[9px] font-bold text-slate-400">ออกแบบและพัฒนาโดย นายภูธนากร หงษ์ทอง</p>
                  <p className="text-[9px] text-slate-400">เลขานุการสภานักเรียน โรงเรียนคำม่วง</p>
              </div>
              {backToAdmin && <button onClick={() => { playSound('tap'); backToAdmin(); }} className="w-full py-2.5 rounded-xl bg-amber-50 text-amber-600 font-bold text-xs hover:bg-amber-100"><i className="fas fa-arrow-left mr-1"></i> กลับแอดมิน</button>}
              <button onClick={handleUserLogout} className="w-full py-2.5 rounded-xl text-rose-500 bg-rose-50 font-bold text-xs hover:bg-rose-100"><i className="fas fa-sign-out-alt mr-1"></i> ออกจากระบบ</button>
            </div>
          </aside>

          {isMobileMenuOpen && <div className="fixed inset-0 bg-slate-900/20 backdrop-blur-sm z-40 lg:hidden" onClick={() => setIsMobileMenuOpen(false)}></div>}

          <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
            <header className="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 flex items-center justify-between shrink-0 z-30">
              <div className="flex items-center gap-3">
                <button onClick={() => setIsMobileMenuOpen(true)} className="lg:hidden w-8 h-8 rounded-lg bg-slate-50 text-slate-600 flex items-center justify-center hover:bg-slate-100"><i className="fas fa-bars"></i></button>
                <div className="bg-slate-100 text-slate-600 px-3 py-1.5 rounded-full text-[11px] font-bold">
                    <i className="fas fa-door-open mr-1 opacity-50"></i>ห้อง {settings?.roomName}
                </div>
              </div>
            </header>

            <div className="flex-1 overflow-y-auto p-4 md:p-6 custom-scrollbar relative z-20">
                 <ErrorBoundary>
                    {isAdmin && (
                        <div className="bg-amber-100 text-amber-800 p-3 rounded-xl mb-4 text-xs font-bold flex items-center gap-2 border border-amber-200 shadow-sm animate-pulse">
                            <i className="fas fa-lock"></i> โหมดผู้ดูแลระบบ: คุณสามารถดูข้อมูลและพิมพ์รายงานได้เท่านั้น (ไม่สามารถแก้ไขข้อมูลได้)
                        </div>
                    )}
                    {renderContent()}
                 </ErrorBoundary>
            </div>
          </main>

          {isExporting === 'loading_cloud' && <div className="fixed inset-0 z-[999] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center"><i className="fas fa-cloud-download-alt text-emerald-400 text-5xl mb-4 animate-bounce"></i><h2 className="text-sm font-bold text-white tracking-wide mt-2">กำลังดาวน์โหลดข้อมูลจากระบบ...</h2></div>}
          {isExporting === 'uploading' && <div className="fixed inset-0 z-[999] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center"><i className="fas fa-image text-blue-400 text-5xl mb-4 animate-pulse"></i><h2 className="text-sm font-bold text-white tracking-wide mt-2">กำลังอัปโหลดรูปภาพ...</h2><p className="text-[10px] text-slate-300 mt-1">บันทึกรูปไปยังฐานข้อมูลกลาง</p></div>}
          {(isExporting && isExporting !== 'loading_cloud' && isExporting !== 'uploading') && <div className="fixed inset-0 z-[999] bg-slate-900/80 backdrop-blur-sm flex flex-col items-center justify-center"><i className="fas fa-circle-notch fa-spin text-[#6d28d9] text-4xl mb-4 bg-white p-3 rounded-full shadow-lg"></i><h2 className="text-sm font-bold text-white tracking-wide mt-2">กำลังสร้างเอกสาร PDF...</h2><p className="text-[10px] text-slate-300 mt-1">กรุณารอสักครู่ ห้ามปิดหน้าจอ</p></div>}

          {attPrintSettings.show && (
              <div className="fixed inset-0 z-[1000] bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center p-4 animate-in fade-in">
                  <div className="bg-white rounded-[24px] w-full max-w-sm p-6 shadow-2xl relative z-[1001]">
                      <h2 className="text-lg font-black text-slate-800 mb-4"><i className="fas fa-print text-[#6d28d9] mr-2"></i>พิมพ์ใบเช็คชื่อ PDF</h2>
                      <div className="space-y-3 mb-5">
                          <label className="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                              <input type="radio" checked={attPrintSettings.filterType === 'all'} onChange={()=>setAttPrintSettings({...attPrintSettings, filterType: 'all'})} className="accent-[#6d28d9]" />
                              <span className="text-sm font-bold text-slate-700">พิมพ์ทั้งหมดทุกคน</span>
                          </label>
                          <label className="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                              <input type="radio" checked={attPrintSettings.filterType === 'present'} onChange={()=>setAttPrintSettings({...attPrintSettings, filterType: 'present'})} className="accent-[#10b981]" />
                              <span className="text-sm font-bold text-emerald-600">เฉพาะคนที่มาเรียน</span>
                          </label>
                          <label className="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                              <input type="radio" checked={attPrintSettings.filterType === 'absent'} onChange={()=>setAttPrintSettings({...attPrintSettings, filterType: 'absent'})} className="accent-[#ef4444]" />
                              <span className="text-sm font-bold text-red-500">เฉพาะคนที่ขาดเรียน</span>
                          </label>
                          <label className="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                              <input type="radio" checked={attPrintSettings.filterType === 'excused'} onChange={()=>setAttPrintSettings({...attPrintSettings, filterType: 'excused'})} className="accent-[#3b82f6]" />
                              <span className="text-sm font-bold text-blue-500">เฉพาะคนที่ลา</span>
                          </label>
                          <label className="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-slate-50 transition-colors">
                              <input type="radio" checked={attPrintSettings.filterType === 'specific'} onChange={()=>setAttPrintSettings({...attPrintSettings, filterType: 'specific'})} className="accent-amber-500" />
                              <span className="text-sm font-bold text-amber-600">เลือกรายบุคคล</span>
                          </label>
                      </div>

                      {attPrintSettings.filterType === 'specific' && (
                          <div className="mb-5 border border-slate-200 rounded-xl overflow-hidden">
                              <div className="p-2 border-b border-slate-100 bg-slate-50">
                                  <input type="text" placeholder="ค้นหาชื่อ..." value={searchPrint} onChange={e=>setSearchPrint(e.target.value)} className="w-full text-xs p-1.5 rounded outline-none border border-slate-200 focus:border-amber-400" />
                              </div>
                              <div className="h-40 overflow-y-auto p-2 space-y-1 custom-scrollbar">
                                  {sortedStudents.filter(s => isActive(s) && (s.name.includes(searchPrint) || s.code.includes(searchPrint))).map(s => (
                                      <label key={s.id} className="flex items-center gap-2 p-1.5 hover:bg-slate-50 rounded cursor-pointer">
                                          <input type="checkbox" checked={attPrintSettings.selectedIds.includes(s.id)} onChange={(e) => {
                                              if(e.target.checked) setAttPrintSettings(p => ({...p, selectedIds: [...p.selectedIds, s.id]}));
                                              else setAttPrintSettings(p => ({...p, selectedIds: p.selectedIds.filter(id => id !== s.id)}));
                                          }} className="accent-amber-500" />
                                          <span className="text-[11px] font-bold text-slate-600 truncate">{s.number}. {s.name}</span>
                                      </label>
                                  ))}
                              </div>
                          </div>
                      )}

                      <div className="flex gap-2">
                          <button onClick={() => setAttPrintSettings({show: false, filterType: 'all', selectedIds: [], activity: 'หน้าเสาธง'})} className="flex-1 py-2.5 bg-slate-100 text-slate-600 font-bold rounded-xl text-xs hover:bg-slate-200">ยกเลิก</button>
                          
                          <button onClick={async () => {
                              if(attPrintSettings.filterType === 'specific' && attPrintSettings.selectedIds.length === 0) { showToast('กรุณาเลือกนักเรียนอย่างน้อย 1 คน', 'warning'); return; }
                              await executeDocExport('pdf', 'pdf-report-container', `เช็คชื่อ_${attPrintSettings.activity}_${currentDate}`);
                              setAttPrintSettings({show: false, filterType: 'all', selectedIds: [], activity: 'หน้าเสาธง'});
                          }} className="flex-1 py-2.5 bg-[#6d28d9] text-white font-bold rounded-xl text-xs hover:bg-[#5b21b6] shadow-md">ยืนยันการพิมพ์</button>
                      </div>
                  </div>
              </div>
          )}

          {selectedQRStudent && (
            <div className="fixed inset-0 z-[900] bg-slate-900/60 backdrop-blur-sm flex flex-col items-center justify-center p-4 animate-in fade-in">
                <div id="single-qr-card-content" className="w-[350px] h-[220px] bg-white border-2 border-slate-300 rounded-[12px] overflow-hidden relative shadow-2xl shrink-0 font-sarabun">
                    <div className="absolute top-0 left-0 w-[125px] h-full bg-slate-50 border-r-2 border-slate-200">
                        <div className="absolute top-[20px] left-[17px] w-[90px] h-[115px] bg-white border border-slate-300 rounded-md overflow-hidden flex items-center justify-center shadow-sm">
                            {selectedQRStudent.image ? <img src={selectedQRStudent.image} className="w-full h-full object-cover" crossOrigin="anonymous" /> : <i className="fas fa-user text-slate-300 text-4xl"></i>}
                        </div>
                        <div className="absolute bottom-0 left-0 w-full bg-[#6d28d9] text-white text-[13px] font-bold text-center py-2">เลขที่ {selectedQRStudent.number || ''}</div>
                    </div>
                    <div className="absolute top-0 left-[125px] w-[225px] h-full p-4 flex flex-col">
                        <div className="mb-2">
                            <div className="font-bold text-slate-800 text-[16px] leading-[1.6] max-h-[50px] overflow-hidden break-words mb-1">{selectedQRStudent.name || ''}</div>
                            <div className="text-slate-500 font-bold text-[12px] leading-[1.4]">รหัส: {selectedQRStudent.code || selectedQRStudent.id}</div>
                            <div className="text-[#6d28d9] font-bold text-[12px] leading-[1.4]">ห้อง: {settings?.roomName}</div>
                        </div>
                        <div className="absolute bottom-4 right-4 border-2 border-slate-200 p-1.5 rounded-lg bg-white shadow-sm"><QRCodeCanvas text={selectedQRStudent.code || selectedQRStudent.id} size={75} /></div>
                    </div>
                    <button onClick={() => setSelectedQRStudent(null)} className="absolute top-2 right-2 w-7 h-7 bg-slate-100/80 hover:bg-slate-200 text-slate-600 rounded-full flex items-center justify-center transition-colors z-10" data-html2canvas-ignore><i className="fas fa-times"></i></button>
                </div>
                <button onClick={() => executeExport('pdf_single_qr')} className="mt-4 bg-[#6d28d9] text-white px-6 py-2.5 rounded-xl font-bold shadow-md text-xs hover:bg-[#5b21b6]"><i className="fas fa-download mr-1"></i> บันทึกรูปภาพ</button>
