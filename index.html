    function AppWrapper() {
        const [globalSettings, setGlobalSettings] = useState(() => {
            try { 
                const saved = localStorage.getItem('cf_global_settings');
                return saved ? JSON.parse(saved) : { schoolLogoUrl: '', zoneCheckUrl: '', adminPin: '123456' }; 
            } catch(e) { return { schoolLogoUrl: '', zoneCheckUrl: '', adminPin: '123456' }; }
        });

        const [rooms, setRooms] = useState(() => {
            try { 
                const saved = localStorage.getItem('cf_global_rooms');
                return saved ? JSON.parse(saved) : []; 
            } catch(e) { return []; }
        });

        const [userSession, setUserSession] = useState(() => {
            try { const saved = localStorage.getItem('cf_auth_session'); return saved ? JSON.parse(saved) : null; } 
            catch(e) { return null; }
        });

        const [dialogConfig, setDialogConfig] = useState(null);

        // 🟢 ดึงข้อมูล Global Setting จาก Supabase
        useEffect(() => {
            const fetchGlobal = async () => {
                if(SUPABASE_URL === "YOUR_SUPABASE_URL") return;
                try {
                    const { data, error } = await supabase
                        .from('classflow_data')
                        .select('payload')
                        .eq('room', 'admin')
                        .eq('type', 'settings')
                        .single();
                    
                    if (data && data.payload) {
                        setGlobalSettings(data.payload.settings || { schoolLogoUrl: '', zoneCheckUrl: '', adminPin: '123456' });
                        if(data.payload.rooms) setRooms(data.payload.rooms);
                    }
                } catch(e) { console.error("โหลด Global Settings ไม่ได้"); }
            };
            fetchGlobal();
        }, []);

        useEffect(() => { localStorage.setItem('cf_global_settings', JSON.stringify(globalSettings)); }, [globalSettings]);
        useEffect(() => { localStorage.setItem('cf_global_rooms', JSON.stringify(rooms)); }, [rooms]);

        useEffect(() => {
            const loader = document.getElementById('loading-screen');
            if (loader) loader.style.display = 'none';
        }, []);

        const showDialog = (config) => setDialogConfig(config);
        const closeDialog = () => setDialogConfig(null);

        const handleLogin = (credentials, remember) => {
            let isValid = false;
            if(credentials.role === 'admin') {
                if(credentials.pin === (globalSettings.adminPin || '123456')) isValid = true;
            } else {
                const roomPin = localStorage.getItem(`cf_${credentials.room}_pin`) || '0000';
                if(credentials.pin === roomPin) isValid = true;
            }

            if(isValid) {
                const session = { ...credentials, pin: credentials.pin };
                if(remember) localStorage.setItem('cf_auth_session', JSON.stringify(session));
                setUserSession(session);
                window.showGlobalToast('เข้าสู่ระบบสำเร็จ', 'success');
            } else {
                showDialog({type: 'alert', title: 'รหัสผิดพลาด', message: 'รหัสความปลอดภัย (PIN) ไม่ถูกต้อง'});
            }
        };

        const handleUpdateRoomPin = (room, newPin) => { localStorage.setItem(`cf_${room}_pin`, newPin); };

        if (!userSession) {
            return (
                <React.Fragment>
                    <LoginPage onLogin={handleLogin} availableRooms={rooms} savedSession={userSession} onClearSession={() => {localStorage.removeItem('cf_auth_session'); setUserSession(null);}} showDialog={showDialog} />
                    <CustomDialog dialog={dialogConfig} closeDialog={closeDialog} />
                </React.Fragment>
            );
        }

        if (userSession.role === 'admin' && !userSession.room) {
             return (
                 <React.Fragment>
                     <AdminDashboard 
                         rooms={rooms} setRooms={(newRooms) => { setRooms(newRooms); syncToCloud('saveSettings', 'admin', { rooms: newRooms, settings: globalSettings }); }}
                         enterRoom={(room) => setUserSession({...userSession, room: room})} 
                         onLogout={() => {localStorage.removeItem('cf_auth_session'); setUserSession(null);}}
                         showDialog={showDialog} globalSettings={globalSettings} setGlobalSettings={setGlobalSettings}
                         onUpdateAdminPin={(pin) => {
                             const newSettings = {...globalSettings, adminPin: pin};
                             setGlobalSettings(newSettings);
                             syncToCloud('saveSettings', 'admin', { rooms: rooms, settings: newSettings });
                         }}
                     />
                     <CustomDialog dialog={dialogConfig} closeDialog={closeDialog} />
                 </React.Fragment>
             );
        }

        return (
            <React.Fragment>
                <DashboardLayout 
                    user={userSession} 
                    onLogout={() => {localStorage.removeItem('cf_auth_session'); setUserSession(null);}} 
                    backToAdmin={userSession.role === 'admin' ? () => setUserSession({...userSession, room: null}) : null}
                    onUpdateRoomPin={handleUpdateRoomPin}
                    showDialog={showDialog}
                    globalSettings={globalSettings}
                />
                <CustomDialog dialog={dialogConfig} closeDialog={closeDialog} />
            </React.Fragment>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    
    let globalSetToast = null;

    window.showGlobalToast = (msg, type = 'info') => {
       if(globalSetToast) {
           globalSetToast({ msg, type });
           setTimeout(() => globalSetToast({ msg: '', type: 'info' }), 3000);
       }
    };

    function AppWithGlobalToast() {
       const [toastObj, setToastObj] = useState({ msg: '', type: 'info' });
       useEffect(() => { globalSetToast = setToastObj; }, []);
       
       let bgColor = 'bg-slate-800';
       let icon = 'fa-info-circle text-blue-400';
       if(toastObj.type === 'success') { bgColor = 'bg-emerald-600'; icon = 'fa-check-circle text-white'; }
       if(toastObj.type === 'error') { bgColor = 'bg-red-600'; icon = 'fa-exclamation-triangle text-white'; }
       if(toastObj.type === 'warning') { bgColor = 'bg-amber-500'; icon = 'fa-exclamation-circle text-white'; }

       return (
           <React.Fragment>
               <AppWrapper />
               {toastObj.msg && (
                   <div className={`fixed top-20 left-1/2 transform -translate-x-1/2 z-[10000] text-white px-5 py-3 rounded-full shadow-2xl font-bold flex items-center gap-2 text-xs toast-enter ${bgColor}`}>
                       <i className={`fas ${icon}`}></i> {toastObj.msg}
                   </div>
               )}
           </React.Fragment>
       )
    }

    root.render(<ErrorBoundary><AppWithGlobalToast /></ErrorBoundary>);
  </script>
</body>
</html>
